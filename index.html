<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kübra bugün kaka yaptı mı?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Fredoka:wght@400;500;600;700&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFE9F1;
    --bg-soft: #FFD6E5;
    --pink: #FF9EBF;
    --pink-deep: #FF6FA3;
    --pink-hot: #E84A85;
    --rose-dark: #B83A6B;
    --peach: #FFC7B8;
    --cream: #FFF5F8;
    --lavender: #E6C9FF;
    --yes: #FF6FA3;
    --yes-dark: #C73E73;
    --no: #B69BD9;
    --no-dark: #6E5499;
    --gold: #FFD66B;
    --text: #6B2E4D;
    --text-soft: #B07A92;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    min-height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Fredoka', sans-serif;
    background: #FFFFFF;
    min-height: 100vh;
    color: var(--text);
    position: relative;
    padding: 2rem 1rem 6rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }

  /* Funny poop stains scattered around */
  .stain {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    opacity: 0.85;
    --rot: 0deg;
    transform: rotate(var(--rot));
  }
  .stain.s1 { top: 5%;  left: 3%;  width: 140px; --rot: -15deg; }
  .stain.s2 { top: 12%; right: 4%; width: 180px; --rot: 25deg; }
  .stain.s3 { top: 48%; left: 2%;  width: 110px; --rot: -40deg; }
  .stain.s4 { bottom: 8%; right: 5%; width: 160px; --rot: 15deg; }
  .stain.s5 { bottom: 25%; left: 6%; width: 130px; --rot: 60deg; }
  .stain.s6 { top: 35%; right: 12%; width: 90px; --rot: -20deg; }
  .stain.s7 { top: 70%; right: 2%; width: 100px; --rot: 45deg; }

  @media (max-width: 600px) {
    .stain.s2, .stain.s3, .stain.s6 { display: none; }
    .stain { width: 90px !important; }
  }

  .container {
    width: 100%;
    max-width: 640px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .header {
    margin-bottom: 2rem;
    animation: dropIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .crown-stink {
    font-size: 2.2rem;
    display: inline-block;
    animation: wiggle 3s ease-in-out infinite;
    margin-bottom: 0.5rem;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }

  h1 {
    font-family: 'Bagel Fat One', cursive;
    font-size: clamp(2rem, 7vw, 3.4rem);
    color: var(--pink-hot);
    line-height: 1.05;
    letter-spacing: -0.5px;
    text-shadow:
      3px 3px 0 var(--bg-soft),
      6px 6px 0 rgba(255, 110, 165, 0.25);
    transform: rotate(-2deg);
    margin: 0.5rem 0;
  }

  h1 .name {
    color: var(--no-dark);
    display: inline-block;
    transform: rotate(3deg);
    text-shadow:
      3px 3px 0 var(--lavender),
      6px 6px 0 rgba(110, 84, 153, 0.18);
  }

  .subtitle {
    font-family: 'Caveat', cursive;
    font-size: 1.4rem;
    color: var(--text-soft);
    margin-top: 0.4rem;
  }

  /* The big card */
  .card {
    background: white;
    border-radius: 32px;
    padding: 2.5rem 2rem 3rem;
    box-shadow:
      0 4px 0 var(--text-soft),
      0 12px 30px rgba(255, 110, 165, 0.2),
      0 24px 60px rgba(255, 110, 165, 0.12);
    border: 4px dashed var(--text-soft);
    position: relative;
    animation: dropIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s backwards;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    background:
      radial-gradient(circle at 0% 0%, rgba(255, 199, 184, 0.4) 0%, transparent 30%),
      radial-gradient(circle at 100% 100%, rgba(255, 181, 167, 0.3) 0%, transparent 30%);
    border-radius: 32px;
    pointer-events: none;
    z-index: 0;
  }

  .card > * { position: relative; z-index: 1; }

  .ribbon {
    display: inline-block;
    background: var(--gold);
    color: var(--text);
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    padding: 0.4rem 1.2rem;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 1.2rem;
    box-shadow: 0 3px 0 #d4a83d;
  }

  .poop-hero {
    font-size: clamp(8rem, 22vw, 11rem);
    display: block;
    margin: 0.5rem auto 0.3rem;
    line-height: 1;
    animation: bounce 2.2s ease-in-out infinite;
    filter: drop-shadow(0 8px 12px rgba(232, 74, 133, 0.3));
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-15px) scale(1.05); }
  }

  .answer {
    font-family: 'Bagel Fat One', cursive;
    font-size: clamp(4rem, 14vw, 6.5rem);
    line-height: 1;
    margin: 0.5rem 0;
    letter-spacing: 1px;
    transition: all 0.5s ease;
  }

  .answer.yes {
    color: var(--yes-dark);
    text-shadow:
      4px 4px 0 var(--yes),
      8px 8px 0 rgba(199, 62, 115, 0.25);
    animation: celebrate 0.6s ease-out;
  }

  .answer.no {
    color: var(--no-dark);
    text-shadow:
      4px 4px 0 var(--no),
      8px 8px 0 rgba(110, 84, 153, 0.25);
    animation: shake 0.5s ease-out;
  }

  .answer.unknown {
    color: var(--text-soft);
    text-shadow:
      3px 3px 0 var(--bg-soft),
      6px 6px 0 rgba(255, 110, 165, 0.15);
    font-size: clamp(2rem, 7vw, 3.2rem);
  }

  @keyframes celebrate {
    0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
    50% { transform: scale(1.2) rotate(5deg); }
    100% { transform: scale(1) rotate(-2deg); opacity: 1; }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px) rotate(-2deg); }
    40% { transform: translateX(10px) rotate(2deg); }
    60% { transform: translateX(-8px) rotate(-1deg); }
    80% { transform: translateX(8px) rotate(1deg); }
  }

  .status-text {
    font-family: 'Caveat', cursive;
    font-size: 1.6rem;
    color: var(--pink-hot);
    margin-top: 0.8rem;
    line-height: 1.3;
  }

  .meta {
    margin-top: 1.5rem;
    padding-top: 1.2rem;
    border-top: 2px dotted var(--bg-soft);
    font-size: 0.9rem;
    color: var(--text-soft);
    font-weight: 500;
  }

  .meta .date {
    font-family: 'Caveat', cursive;
    font-size: 1.2rem;
    color: var(--pink-hot);
    margin-top: 0.2rem;
  }

  /* Confetti for YES */
  .confetti {
    position: fixed;
    top: -20px;
    font-size: 1.5rem;
    pointer-events: none;
    z-index: 100;
    animation: fall linear forwards;
  }

  @keyframes fall {
    to {
      transform: translateY(110vh) rotate(720deg);
      opacity: 0;
    }
  }

  /* Loading state */
  .loading .poop-hero { animation: spin 1.2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Admin notice */
  .admin-notice {
    position: fixed;
    bottom: 1rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--cream);
    padding: 0.6rem 1.2rem;
    border-radius: 100px;
    font-size: 0.85rem;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    z-index: 200;
    animation: slideUp 0.4s ease-out;
  }

  @keyframes slideUp {
    from { transform: translate(-50%, 100%); opacity: 0; }
    to { transform: translate(-50%, 0); opacity: 1; }
  }

  /* Action buttons */
  .actions {
    margin-top: 1.5rem;
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    animation: dropIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s backwards;
  }

  .btn {
    font-family: 'Bagel Fat One', cursive;
    font-size: 1.4rem;
    letter-spacing: 1px;
    padding: 0.9rem 1.8rem;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    color: white;
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.2s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-emoji { font-size: 1.4rem; line-height: 1; }
  .btn-label { line-height: 1; }

  .btn-yes {
    background: linear-gradient(135deg, #FF7AB0 0%, #E84A85 100%);
    box-shadow: 0 5px 0 #B83A6B, 0 10px 20px rgba(232, 74, 133, 0.35);
  }

  .btn-no {
    background: linear-gradient(135deg, #C7A8E8 0%, #9B7FC4 100%);
    box-shadow: 0 5px 0 #6E5499, 0 10px 20px rgba(155, 127, 196, 0.35);
  }

  .btn:hover {
    transform: translateY(-2px) rotate(-1deg);
    filter: brightness(1.05);
  }
  .btn:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 #B83A6B, 0 4px 10px rgba(232, 74, 133, 0.3);
  }
  .btn-no:active {
    box-shadow: 0 2px 0 #6E5499, 0 4px 10px rgba(155, 127, 196, 0.3);
  }

  .btn:disabled {
    opacity: 0.6;
    cursor: wait;
    transform: none !important;
  }

  .footer-note {
    margin-top: 1.5rem;
    font-family: 'Caveat', cursive;
    font-size: 1.1rem;
    color: var(--text-soft);
    opacity: 0.85;
  }

  /* Stink lines for YES state */
  .stink-lines {
    position: absolute;
    top: 4rem;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .stink-lines.show { opacity: 0.7; }
  .stink-lines span {
    display: inline-block;
    font-size: 1.5rem;
    margin: 0 0.3rem;
    animation: rise 2s ease-out infinite;
  }
  .stink-lines span:nth-child(2) { animation-delay: 0.4s; }
  .stink-lines span:nth-child(3) { animation-delay: 0.8s; }

  @keyframes rise {
    0% { transform: translateY(0); opacity: 0; }
    30% { opacity: 1; }
    100% { transform: translateY(-40px); opacity: 0; }
  }

  @media (max-width: 480px) {
    .card { padding: 2rem 1.2rem 2.5rem; border-radius: 24px; }
  }
</style>

<script>
// ┌──────────────────────────────────────────────────────────────┐
// │  Cloudflare Worker URL'ini buraya yapıştır.                  │
// │  Kurulum talimatları için worker.js dosyasının üstüne bak.   │
// └──────────────────────────────────────────────────────────────┘
const API_URL = 'https://kubra-status.aricihh-kbky.workers.dev';

const TR_DAYS = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
const TR_MONTHS = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];

function todayKey() {
  return new Intl.DateTimeFormat('en-CA', {
    timeZone: 'Europe/Istanbul',
    year: 'numeric', month: '2-digit', day: '2-digit'
  }).format(new Date());
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return '—';
  const day = TR_DAYS[d.getDay()];
  const date = d.getDate();
  const month = TR_MONTHS[d.getMonth()];
  const hours = String(d.getHours()).padStart(2, '0');
  const mins = String(d.getMinutes()).padStart(2, '0');
  return `${day}, ${date} ${month} · ${hours}:${mins}`;
}

async function loadStatus() {
  try {
    const r = await fetch(API_URL + '/', { cache: 'no-store' });
    if (!r.ok) return null;
    const data = await r.json();
    return (data && data.answer) ? data : null;
  } catch (e) {
    return null;
  }
}

async function setStatusRemote(value) {
  try {
    const r = await fetch(`${API_URL}/set?value=${encodeURIComponent(value)}`, { cache: 'no-store' });
    if (!r.ok) return null;
    const data = await r.json();
    return (data && data.answer) ? data : null;
  } catch (e) {
    return null;
  }
}

function dropConfetti() {
  const emojis = ['💩', '✨', '🎉', '⭐', '🌟', '💖'];
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.animationDuration = (2 + Math.random() * 2) + 's';
      el.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4500);
    }, i * 60);
  }
}

function render(data) {
  const card = document.getElementById('card');
  const answer = document.getElementById('answer');
  const status = document.getElementById('status');
  const updateDate = document.getElementById('updateDate');
  const hero = document.getElementById('hero');
  const stinkLines = document.getElementById('stinkLines');

  card.classList.remove('loading');
  answer.classList.remove('yes', 'no', 'unknown');
  stinkLines.classList.remove('show');

  const today = todayKey();
  const isToday = data && data.date === today;

  if (!data || !isToday) {
    answer.textContent = 'henüz bilinmiyor';
    answer.classList.add('unknown');
    status.textContent = isToday ? 'rapor bekleniyor 🤔' : 'bugünün raporu henüz girilmedi';
    hero.textContent = '🚽';
    updateDate.textContent = data ? formatDate(data.updated) : 'hiç güncellenmedi';
    return;
  }

  if (data.answer === 'yes') {
    answer.textContent = 'EVET! 🎉';
    answer.classList.add('yes');
    status.textContent = 'aferin Kübra! sağlıklı bir gün ✨';
    hero.textContent = '💩';
    stinkLines.classList.add('show');
    dropConfetti();
  } else if (data.answer === 'no') {
    answer.textContent = 'HAYIR 😔';
    answer.classList.add('no');
    status.textContent = 'henüz yok... bol lif ve su tavsiye edilir 🥦💧';
    hero.textContent = '🚽';
  } else {
    answer.textContent = 'henüz bilinmiyor';
    answer.classList.add('unknown');
    status.textContent = 'rapor bekleniyor 🤔';
    hero.textContent = '🤷';
  }

  updateDate.textContent = formatDate(data.updated);
}

function showAdminNotice(text) {
  const el = document.createElement('div');
  el.className = 'admin-notice';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity 0.5s';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 500);
  }, 3000);
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const setParam = params.get('set');

  // Gizli admin URL'leri: ?set=yes | ?set=no | ?set=reset
  if (setParam) {
    let data;
    if (setParam === 'yes' || setParam === 'evet') {
      data = await setStatusRemote('yes');
      showAdminNotice(data ? '✅ EVET olarak kaydedildi' : '⚠️ Hata oldu');
    } else if (setParam === 'no' || setParam === 'hayir') {
      data = await setStatusRemote('no');
      showAdminNotice(data ? '✅ HAYIR olarak kaydedildi' : '⚠️ Hata oldu');
    } else if (setParam === 'reset' || setParam === 'clear') {
      await setStatusRemote('reset');
      showAdminNotice('🔄 Sıfırlandı');
      data = null;
    }
    // URL'i temizle ki gizli parametre adres çubuğunda kalmasın
    window.history.replaceState({}, document.title, window.location.pathname);
    render(data);
    return;
  }

  const data = await loadStatus();
  render(data);
}

init();

// Buton tıklamaları
document.getElementById('actions').addEventListener('click', async (e) => {
  const btn = e.target.closest('.btn');
  if (!btn) return;
  const value = btn.dataset.value;

  // Tüm butonları kilitle
  const buttons = document.querySelectorAll('#actions .btn');
  buttons.forEach(b => b.disabled = true);

  let data = null;
  if (value === 'yes') {
    data = await setStatusRemote('yes');
    showAdminNotice(data ? '✅ EVET kaydedildi' : '⚠️ Hata oldu');
  } else if (value === 'no') {
    data = await setStatusRemote('no');
    showAdminNotice(data ? '✅ HAYIR kaydedildi' : '⚠️ Hata oldu');
  } else if (value === 'reset') {
    await setStatusRemote('reset');
    showAdminNotice('🔄 Sıfırlandı');
    data = null;
  }
  render(data);

  buttons.forEach(b => b.disabled = false);
});

// Her 30 saniyede bir tazele
setInterval(async () => {
  const data = await loadStatus();
  render(data);
}, 30000);
</script>
